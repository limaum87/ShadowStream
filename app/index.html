<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Raspberry Radio</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Controle Remoto</p>
        <h1>Raspberry Radio</h1>
        <p class="hero-copy">Esta pagina controla a reproducao de audio no Raspberry. Quem abre esta pagina apenas envia comandos; o som sai pela placa de audio do Raspberry.</p>
      </section>

      <section class="player-card" aria-label="Controles de reproducao">
        <div class="station-header">
          <div>
            <p class="label">Tocando agora</p>
            <h2 id="current-station">Nenhuma estacao selecionada</h2>
          </div>
          <span class="status-pill" id="status-pill">Parado</span>
        </div>

        <div class="controls">
          <button id="play-selected" class="primary-button" type="button">Tocar</button>
          <button id="pause" class="secondary-button" type="button">Pausar</button>
          <button id="resume" class="secondary-button" type="button">Retomar</button>
          <button id="stop" class="secondary-button" type="button">Parar</button>
        </div>

        <label class="volume-control" for="volume">
          <span>Volume da saida de audio</span>
          <input id="volume" type="range" min="0" max="100" step="1" value="80">
        </label>

        <p id="message" class="message" role="status">Carregando lista de estacoes...</p>
      </section>

      <section class="stations-card" aria-label="Estacoes">
        <div class="stations-title-row">
          <div>
            <p class="label">Estacoes</p>
            <h2>Streams Disponiveis</h2>
          </div>
        </div>
        <div id="station-list" class="station-list"></div>
        <div class="add-station-form">
          <input id="new-station-name" type="text" placeholder="Nome da estacao">
          <input id="new-station-url" type="text" placeholder="URL do stream">
          <button id="add-station" class="primary-button" type="button">Adicionar</button>
        </div>
      </section>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
</html>
